<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-4 mb-10">
            <div class="flex items-center gap-4">
                <div id="hero-icon" class="w-12 h-12 flex items-center justify-center shadow-lg transition-transform">
                    <img src="assets/logo.png">
                </div>
                <div>
                    <h1 class="font-gaming text-xl font-black tracking-widest uppercase">Task <span class="text-primary">Master</span></h1>
                    <div class="text-[10px] text-slate-500 font-bold tracking-widest flex items-center gap-2">
                        Renaissances : <span id="rb-val">0</span> | v1.2
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="asc-display" class="glass px-3 py-1 rounded-xl flex items-center gap-2 border-primary/20 transition-all">
                    <span id="asc-pts-header" class="font-gaming text-primary font-bold text-lg">0</span>
                    <i class="fa-solid fa-star text-primary text-xs"></i>
                </div>
                <div id="coin-display" class="glass px-3 py-1 rounded-xl flex items-center gap-2 border-yellow-500/20 transition-all">
                    <span id="coins" class="font-gaming text-yellow-500 font-bold text-lg">0</span>
                    <span id="coin-icon"></span>
                </div>
                <button onclick="openModal('modal-shop')" class="bg-yellow-500 inline-flex gap-1 items-center content-center text-slate-900 px-5 py-2.5 rounded-xl font-black text-xs uppercase transition-all active:scale-95">
                    <i class="fa fa-star"></i>    
                    <span>Évolution</span>
                </button>
                <button onclick="openModal('modal-config')" class="glass py-1.5 px-3 rounded-xl hover:bg-slate-800 transition-colors border-white/10">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div id="profile-card" class="glass p-8 rounded-[2.5rem] border-white/5 text-center transition-all relative overflow-hidden">
                    <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
                    
                    <div id="comp-icon-box" class="w-20 h-20 mx-auto mb-4 bg-gradient-to-br from-slate-900 to-slate-800 rounded-full flex items-center justify-center border-2 border-primary/30 shadow-lg">
                        <i id="comp-icon" class="fa-solid fa-robot text-3xl text-primary"></i>
                    </div>
                    
                    <h2 id="comp-stage" class="font-gaming text-2xl font-black uppercase tracking-tighter mb-2 bg-gradient-to-r from-primary to-purple-500 bg-clip-text">...</h2>
                    <div id="comp-rank" class="text-[11px] bg-primary/10 text-primary px-4 py-1.5 rounded-full font-bold uppercase tracking-widest mb-2 inline-block border border-primary/30">RANG I</div>
                    <p id="comp-desc" class="text-[10px] text-slate-400 italic mb-6">Le début de votre voyage</p>
                    
                    <div class="space-y-4 text-left">
                        <div id="next-rank-info" class="bg-slate-900/60 p-4 rounded-xl border border-white/5"></div>
                    </div>
                </div>

                <div id="daily-card-sidebar"></div>
            </aside>

            <main class="lg:col-span-8 space-y-6">
                <div id="input-area" class="glass p-3 rounded-3xl flex flex-wrap items-center gap-3 border-white/10 transition-all hover:border-primary/30">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-purple-600 flex items-center justify-center shadow-lg">
                        <i class="fa-solid text-slate-500 fa-plus text-lg"></i>
                    </div>
                    <input type="text" id="q-input" placeholder="Nouvel objectif..." class="flex-1  bg-transparent border-none px-2 text-base font-semibold outline-none text-white min-w-[200px] placeholder:text-slate-600">
                    
                    <div class="relative" style="z-index: 9999;">
                        <button id="cat-selector-btn" onclick="toggleCategorySelector()" class="glass py-3 px-5 rounded-2xl flex items-center gap-3 cursor-pointer hover:bg-slate-800/50 transition-all border border-white/10 hover:border-primary/30">
                            <div id="selected-cat-icon" class="w-6 h-6 rounded-lg flex items-center justify-center" style="background: #06b6d433;">
                                <i class="fa-solid fa-tag text-xs" style="color: #06b6d4;"></i>
                            </div>
                            <span id="selected-cat-name" class="text-xs font-black uppercase text-white">Général</span>
                            <i class="fa-solid fa-chevron-down text-slate-500 text-xs"></i>
                        </button>
                        
                        <div id="cat-selector-dropdown" class="absolute top-full mt-2 right-0 glass rounded-2xl border border-white/10 shadow-2xl min-w-[200px] hidden" style="z-index: 10000;">
                            <div id="cat-selector-list" class="p-2 max-h-64 overflow-y-auto"></div>
                        </div>
                    </div>
                    
                    <button id="add-quest-btn" onclick="addQuest()" disabled class="bg-gradient-to-r from-primary to-purple-600 text-white px-6 py-3 rounded-2xl shadow-lg hover:scale-105 active:scale-95 transition-transform font-bold text-sm disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:scale-100">
                        <i class="fa-solid fa-rocket mr-2"></i>Ajouter
                    </button>
                </div>
                
                
                <div id="filter-bar" class="flex gap-3 overflow-x-auto py-2 no-scrollbar"></div>

                <div id="quest-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </main>
        </div>
    </div>

    <div id="modal-config" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-2xl mx-4 border-white/10 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-gaming text-xl font-black uppercase text-primary flex items-center gap-3">
                    <i class="fa-solid fa-gear"></i>
                    Configuration
                </h3>
                <button onclick="closeModal('modal-config')" class="text-slate-500 hover:text-white text-3xl transition-colors">&times;</button>
            </div>
            
            <div id="config-tabs"></div>
            
            <div id="cat-manage-list" class="space-y-2 mb-6 max-h-80 overflow-y-auto pr-2 no-scrollbar"></div>
            
            <div id="cat-form-area"></div>
        </div>
    </div>

    <div id="modal-shop" class="modal">
        <div id="shop-card" class="glass p-10 rounded-[3rem] w-full max-w-4xl mx-4 border border-yellow-500/20 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-yellow-500 to-orange-500 flex items-center justify-center shadow-xl">
                        <i class="fa-solid fa-star text-white text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="font-gaming text-2xl font-black text-yellow-500 uppercase tracking-wider">Évolution du rang</h3>
                    </div>
                </div>
                <button onclick="closeModal('modal-shop')" class="text-slate-500 hover:text-white text-3xl transition-colors hover:rotate-90 duration-300">&times;</button>
            </div>
            
            <div id="shop-items-container"></div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="animations.js"></script>
    <script src="app.js"></script>
</body>
</html>
